services:
  # 共通データベース
  db:
    image: mysql:8.0
    container_name: onomachi-it-media-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME_WP}
      MYSQL_USER: ${DB_USER_WP}
      MYSQL_PASSWORD: ${DB_PASSWORD_WP}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # メイン窓口 (Gateway)
  gateway:
    image: nginx:latest
    container_name: gateway-nginx
    restart: always
    ports:
      - "80:80"
    environment:
      - PC_NAME=${PC_NAME}
    volumes:
      - ./gateway/default.conf.template:/etc/nginx/templates/default.conf.template
    depends_on:
      redmine:
        condition: service_healthy
      redmine-test:
        condition: service_healthy
      wp-nginx:
        condition: service_started
      phpmyadmin:
        condition: service_started

  # Redmine
  redmine:
    image: redmine:latest
    container_name: redmine-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      postfix:
        condition: service_started
    environment:
      REDMINE_DB_MYSQL: db
      REDMINE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      RAILS_RELATIVE_URL_ROOT: /redmine
    volumes:
      - ./redmine/data:/usr/src/redmine/files
      - ./redmine/config.ru:/usr/src/redmine/config.ru
      - ./redmine/plugins:/usr/src/redmine/plugins
      - ./redmine/configuration.yml:/usr/src/redmine/config/configuration.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/redmine"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  # WordPress (PHP)
  wp-php:
    build: ./wordpress/onomachi-it-media/php
    container_name: wp-php-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME_WP}
      WORDPRESS_DB_USER: ${DB_USER_WP}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD_WP}
    volumes:
      - ./wordpress/onomachi-it-media/html:/var/www/html
      - ./wordpress/onomachi-it-media/php/php.ini:/usr/local/etc/php/conf.d/php.ini

  # WordPress (Nginx)
  wp-nginx:
    image: nginx:latest
    container_name: wp-nginx-server
    restart: always
    volumes:
      - ./wordpress/onomachi-it-media/html:/var/www/html
      - ./wordpress/onomachi-it-media/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - wp-php

  # Redmine 検証環境
  redmine-test:
    image: redmine:latest
    container_name: redmine-test-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      postfix:
        condition: service_started
    environment:
      REDMINE_DB_MYSQL: db
      REDMINE_DB_DATABASE: redmine_test
      REDMINE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      RAILS_RELATIVE_URL_ROOT: /redmine-test
    volumes:
      - ./redmine-test/data:/usr/src/redmine/files
      - ./redmine-test/config.ru:/usr/src/redmine/config.ru
      - ./redmine-test/plugins:/usr/src/redmine/plugins
      - ./redmine/configuration.yml:/usr/src/redmine/config/configuration.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/redmine-test"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  # 定期メール送信スケジューラ (Ofelia)
  cron:
    image: mcuadros/ofelia:latest
    container_name: redmine-cron
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./cron/config.ini:/etc/ofelia/config.ini
    depends_on:
      redmine:
        condition: service_healthy

  # Postfix メールリレー
  postfix:
    image: boky/postfix
    container_name: postfix-relay
    restart: always
    environment:
      ALLOWED_SENDER_DOMAINS: ${SMTP_DOMAIN}
      HOSTNAME: mail.${SMTP_DOMAIN}
      # 外部SMTPサーバへリレーする場合は以下を設定
      # RELAYHOST: relay.example.lg.jp:25
      # RELAYHOST_USERNAME: user
      # RELAYHOST_PASSWORD: password

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: it-media-pma
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_ABSOLUTE_URI: http://${PC_NAME}/phpmyadmin/
      UPLOAD_LIMIT: 512M
      MAX_EXECUTION_TIME: 600
    depends_on:
      - db

volumes:
  db_data: