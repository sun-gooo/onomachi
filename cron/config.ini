# -------------------------------------------------------
# 期限切れ・3日以内のチケットのリマインダーメール送信
# -------------------------------------------------------
# schedule: 毎日 08:00 に実行 (分 時 日 月 曜日)
# days=3 : 今日から3日後までが期限のチケット（期限切れ含む）を対象
[job-exec "redmine-send-reminders"]
schedule    = 0 8 * * *
container   = redmine-app
command     = bundle exec rake redmine:send_reminders days=3 RAILS_ENV=production
no-overlap  = true

# -------------------------------------------------------
# 検証環境 (redmine-test) にも同じリマインダーを送る場合
# 不要ならこのブロックを削除またはコメントアウト
# -------------------------------------------------------
